services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: savoir_ia_postgres
    environment:
      POSTGRES_DB: savoir_ia
      POSTGRES_USER: savoir_ia
      POSTGRES_PASSWORD: savoir_ia_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savoir_ia"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: savoir_ia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
